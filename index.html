<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Channel Clone</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="header">
<h2>CHANNEL VIEW</h2>
</header>

<div class="container">

<!-- HERO -->
<div class="hero-row">

<div class="hero">
<div id="hero-video"></div>
</div>

<div class="trending">
<h3>🔥 Sedang Trending</h3>
<div id="trending"></div>
</div>

</div>

<!-- CHANNEL INFO -->
<div class="channel-info">

<div class="channel-header">

<img id="channel-logo">

<div class="channel-main">

<div class="channel-row">
<h2 id="channel-name"></h2>
<button class="subscribe-btn">Subscribe</button>
</div>

<div class="channel-row">
<span id="channel-handle"></span>
</div>

<div class="channel-links">

<a href="#" class="social-btn"><i class="fab fa-youtube"></i></a>
<a href="#" class="social-btn"><i class="fab fa-instagram"></i></a>
<a href="#" class="social-btn"><i class="fab fa-facebook"></i></a>
<a href="#" class="social-btn"><i class="fab fa-tiktok"></i></a>

<button class="sawer-btn">Sawer Online</button>

</div>

</div>

</div>

</div>

<!-- CONTENT -->
<div class="content-row">

<div class="left-content">

<section>
<h3>Videos</h3>
<div id="videos" class="videos"></div>
</section>

</div>

<div class="right-ads">

<div class="ads">PASANG IKLAN DISINI</div>
<div class="ads">PASANG IKLAN DISINI</div>
<div class="ads">PASANG IKLAN DISINI</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
