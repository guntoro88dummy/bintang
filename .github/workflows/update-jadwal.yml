name: Update Jadwal Wayang

on:
workflow_dispatch:
schedule:
- cron: '0 * * * *'

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v3

  - name: Fetch Jadwal
    run: |
      curl -L "https://www.kluban.net/feeds/posts/default?alt=json" -o jadwal.json

  - name: Commit
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"
      git add jadwal.json
      git diff --quiet && git diff --staged --quiet || git commit -m "Auto update jadwal"
      git push
