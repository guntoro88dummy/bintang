```
steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Fetch Jadwal
    run: |
      curl -L "https://www.kluban.net/feeds/posts/default?alt=json" -o jadwal.json || echo "{}" > jadwal.json

  - name: Commit
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add jadwal.json
      git diff --quiet && git diff --staged --quiet || git commit -m "Auto update jadwal"
      git push
