```
steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Fetch Jadwal Wayang
    run: |
      curl -L "https://www.kluban.net/feeds/posts/default?alt=json" -o jadwal.json

  - name: Commit file
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add jadwal.json
      git commit -m "Auto update jadwal" || echo "No changes"
      git push
