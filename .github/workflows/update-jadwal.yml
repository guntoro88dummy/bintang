```
steps:
  - uses: actions/checkout@v3

  - name: Fetch via Proxy
    run: |
      curl -L "https://api.allorigins.win/raw?url=https://www.kluban.net/feeds/posts/default?alt=json" -o rss.json

  - name: Commit
    run: |
      git config user.name "github-actions"
      git config user.email "actions@github.com"
      git add rss.json
      git commit -m "Update RSS" || echo "No changes"
      git push
