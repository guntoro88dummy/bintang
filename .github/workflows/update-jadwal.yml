name: Update Jadwal Wayang

on:
schedule:
- cron: "0 */6 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Fetch RSS
    run: |
      curl -L https://www.kluban.net/feeds/posts/default?alt=json -o jadwal.json

  - name: Commit & Push
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"
      git add jadwal.json
      git commit -m "Auto update jadwal" || echo "No changes"
      git push
```
